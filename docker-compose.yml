version: "3.9"

services:
  # ── MongoDB ─────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-changeme}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-changeme}@mongo:27017/?authSource=admin
      DB_NAME: ${DB_NAME:-travel_planner}
      JWT_SECRET: ${JWT_SECRET:-REPLACE_WITH_SECURE_RANDOM_SECRET_MIN_32_CHARS_LONG}
      GIN_MODE: release
      PORT: "5000"
      ALLOWED_ORIGINS: http://localhost,http://localhost:80
      MONGO_MAX_POOL_SIZE: "200"
      MONGO_MIN_POOL_SIZE: "20"
      RATE_LIMIT_RPS: "100"
      REQUEST_TIMEOUT_SECONDS: "30"
      LOG_LEVEL: info
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy

  # ── Frontend (Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
